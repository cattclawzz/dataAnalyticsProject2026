<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>text file in html</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

	<p id="demo">Fetch a file to change this text.</p>

</body>

</html>

<script>
	window.onload = function() {
		let file = "animationEg.py"
		fetch (file)
			.then(x => x.text())
			.then(y => document.getElementById("demo").innerHTML = y);
		}
</script>
